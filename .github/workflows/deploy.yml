name: Deploy Backend OCI

on:
  push:
    branches:
      - "main"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuração do Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # Build do projeto
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      # Login no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build e push da imagem
      - name: Build and Push with Docker Compose
        run: |
          export DOCKER_USER=${{ secrets.DOCKERHUB_USERNAME }}
          docker compose build
          docker compose push

      # Deploy na VM OCI via SSH
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP_BACK }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY_BACK }}
          script: |
            mkdir -p ~/clinicamedagil-api
            cd ~/clinicamedagil-api

            # Criar docker-compose.yml na VM (caso não exista)
            cat <<EOF > docker-compose.yml
            services:
              api:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/clinicamedagil-api:latest
                container_name: backend
                ports:
                  - "8080:8080"
                restart: always
            EOF

            # Atualizar container
            sudo docker compose pull
            sudo docker compose up -d