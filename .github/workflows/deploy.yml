name: Deploy Backend OCI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push with Docker Compose
        run: |
          # O build usa o seu docker-compose.yml
          docker compose build
          docker compose push

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP_BACK }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY_BACK }}
          script: |
            # Garante que a pasta existe na VM
            mkdir -p ~/clinicamedagil-api
            cd ~/clinicamedagil-api
            
            # O ideal é que o docker-compose.yml também esteja na VM
            # Se não estiver, o comando abaixo pode falhar. 
            sudo docker compose pull
            sudo docker compose up -d