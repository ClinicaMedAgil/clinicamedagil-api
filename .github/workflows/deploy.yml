name: Deploy Backend OCI

on:
  push:
    branches:
      - "main"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configuração do Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # 3. Build do projeto (Gera o .jar)
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      # 4. Login no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build e Push (Usando Docker direto para evitar erro de DNS/Interpolação)
      - name: Build and Push Docker Image
        run: |
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicamedagil-api:latest .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicamedagil-api:latest

      # 6. Deploy na VM OCI via SSH
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP_BACK }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY_BACK }}
          script: |
            mkdir -p ~/clinicamedagil-api
            cd ~/clinicamedagil-api

            # Criar/Atualizar o docker-compose.yml dinamicamente na VM
            cat <<EOF > docker-compose.yml
            services:
              api:
                image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clinicamedagil-api:latest
                container_name: backend
                ports:
                  - "8080:8080"
                restart: always
                # Se precisar do Postgres na mesma rede, adicione as configs aqui
            EOF

            # Atualizar e subir os containers
            sudo docker compose pull
            sudo docker compose up -d
