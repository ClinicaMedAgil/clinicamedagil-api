services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicamedagil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_cliagil
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_cliagil"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
