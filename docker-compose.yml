# Stack nesta VM: Nginx :80 → Spring :8080 → Postgres (API e banco no mesmo host).
# O front roda em outra VM; o browser chama esta API pelo IP/DNS desta máquina (Security List/NSG + CORS).
#
# CORS: APP_CORS_ALLOWED_ORIGINS = origem do front (ex.: http://134.65.24.235).

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: clinicamedagil-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - clianet

  api:
    image: clinicamedagil-api:local
    container_name: clinicamedagil-api
    restart: unless-stopped
    ports: # Mudamos de 'expose' para 'ports' para garantir acesso externo se necessário
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Apontamos para o Gateway do Docker ou host.docker.internal
      - SPRING_DATASOURCE_URL=jdbc:postgresql://172.17.0.1:5432/db_cliagil
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://134.65.24.235,http://134.65.24.235:80,http://localhost:5173,http://127.0.0.1:5173}
      - APP_SEED_ENABLED=${APP_SEED_ENABLED:-true}
    networks:
      - clianet

networks:
  clianet:
    driver: bridge