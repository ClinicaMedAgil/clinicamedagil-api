# Stack nesta VM: Nginx :80 → Spring :8080 → Postgres (API e banco no mesmo host).
# O front roda em outra VM; o browser chama esta API pelo IP/DNS desta máquina (Security List/NSG + CORS).
#
# CORS: APP_CORS_ALLOWED_ORIGINS = origem do front (ex.: http://134.65.24.235).

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: clinicamedagil-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - clianet

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: clinicamedagil-api:local
    container_name: clinicamedagil-api
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_cliagil
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://134.65.24.235,http://134.65.24.235:80,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
    networks:
      - clianet

  postgres:
    image: postgres:16-alpine
    container_name: clinicamedagil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_cliagil
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_cliagil"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clianet

volumes:
  postgres_data:

networks:
  clianet:
    driver: bridge
