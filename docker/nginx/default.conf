# API atrás do Nginx — mesmas URLs que no Spring (ex.: /clinicamedagil-service/...)
# O frontend em http://134.65.24.235 chama a API em http://<IP-privado-da-VM>/...

upstream clinicamedagil_api {
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 20M;

    location / {
        proxy_pass http://clinicamedagil_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
