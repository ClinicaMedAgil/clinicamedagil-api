spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_cliagil_test}
spring.datasource.username=${SPRING_TEST_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_TEST_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.seed.enabled=false
